<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>Kanji Drawing Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            future: {
                hoverOnlyWhenSupported: true,
            }

    <style>
        body {
            touch-action: none;
            overscroll-behavior: none;
        }

        canvas {
            touch-action: none;

            background-size: 50% 50%, 50% 50%, 100% 100%, 100% 100%;
            background-position: center center;
        }
    </style>
</head>

<body class="bg-gray-100 h-screen w-screen flex flex-col items-center py-8 font-sans overflow-hidden">

    <!-- Main View -->

            </div>
        </div>

        function playPartyPopper() {
            if (isMuted) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);

            const bufferSize = audioCtx.sampleRate * 0.5;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'lowpass';
            noiseFilter.frequency.value = 5000;
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.6, audioCtx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

            noise.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noise.start();

        // --- INIT & SIZING ---
        function resizeCanvas() {

        // --- MATH & HEURISTICS ---
        function getPointsFromSvgPath(d, numPoints) {
            svgPathEl.setAttribute('d', d);
            const length = svgPathEl.getTotalLength();
            const points = [];
            for (let i = 0; i < numPoints; i++) {
                const pt = svgPathEl.getPointAtLength((i / (numPoints - 1)) * length);
                points.push({ x: pt.x, y: pt.y });
            }
            return points;
        }

        function getPointsFromStroke(strokePoints, numPoints) {
            if (strokePoints.length === 0) return [];
            if (strokePoints.length === 1) return Array(numPoints).fill({ ...strokePoints[0] });

            let totalLength = 0;
            const distances = [0];
            for (let i = 1; i < strokePoints.length; i++) {
                const dx = strokePoints[i].x - strokePoints[i - 1].x;
                const dy = strokePoints[i].y - strokePoints[i - 1].y;
                totalLength += Math.sqrt(dx * dx + dy * dy);
                distances.push(totalLength);
            }

            const points = [];
            for (let i = 0; i < numPoints; i++) {
                const targetDist = (i / (numPoints - 1)) * totalLength;
                let idx = 1;
                while (idx < distances.length && distances[idx] < targetDist) idx++;
                if (idx >= distances.length) {
                    points.push({ ...strokePoints[strokePoints.length - 1] });
                    continue;
                }
                const prevDist = distances[idx - 1];
                const segmentLength = distances[idx] - prevDist;
                const t = segmentLength === 0 ? 0 : (targetDist - prevDist) / segmentLength;
                points.push({
                    x: strokePoints[idx - 1].x + (strokePoints[idx].x - strokePoints[idx - 1].x) * t,
                    y: strokePoints[idx - 1].y + (strokePoints[idx].y - strokePoints[idx - 1].y) * t
                });
            }
            return points;
        }

        function getBoundingBox(points) {
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            points.forEach(p => {
                if (p.x < minX) minX = p.x;
                if (p.y < minY) minY = p.y;
                if (p.x > maxX) maxX = p.x;
                if (p.y > maxY) maxY = p.y;
            });
            return { minX, minY, maxX, maxY, width: maxX - minX, height: maxY - minY };
        }

        function getStrokeLength(pts) {
            let len = 0;
            for (let i = 1; i < pts.length; i++) {
                len += Math.hypot(pts[i].x - pts[i - 1].x, pts[i].y - pts[i - 1].y);
            }
            return len;
        }

        function getStrokeAngle(pts) {
            return Math.atan2(pts[pts.length - 1].y - pts[0].y, pts[pts.length - 1].x - pts[0].x);
        }

        function getAngleDiffDeg(a1, a2) {
            let diff = Math.abs(a1 - a2) % (Math.PI * 2);
            if (diff > Math.PI) diff = Math.PI * 2 - diff;
            return diff * (180 / Math.PI);
        }

        function calculateRMSDistance(pts1, pts2) {
            let sumSq1 = 0;
            for (let i = 0; i < pts1.length; i++) {
                let minDSq = Infinity;
                for (let j = 0; j < pts2.length; j++) {
                    const dx = pts1[i].x - pts2[j].x;
                    const dy = pts1[i].y - pts2[j].y;
                    const dSq = dx * dx + dy * dy;
                    if (dSq < minDSq) minDSq = dSq;
                }
                sumSq1 += minDSq;
            }
            let rms1 = sumSq1 / pts1.length;

            let sumSq2 = 0;
            for (let i = 0; i < pts2.length; i++) {
                let minDSq = Infinity;
                for (let j = 0; j < pts1.length; j++) {
                    const dx = pts2[i].x - pts1[j].x;
                    const dy = pts2[i].y - pts1[j].y;
                    const dSq = dx * dx + dy * dy;
                    if (dSq < minDSq) minDSq = dSq;
                }
                sumSq2 += minDSq;
            }
            let rms2 = sumSq2 / pts2.length;

            return Math.sqrt((rms1 + rms2) / 2);
        }

        // --- QUEUE & SETTINGS LOGIC ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const getMasteryPercent = (interval) => {
            if (!interval) return 0;
            const MIN_DISTANCE = 4;
            const MAX_DISTANCE = 128;
            const levelsAchieved = Math.log2(interval / MIN_DISTANCE);
            const maxLevels = Math.log2(MAX_DISTANCE / MIN_DISTANCE);
            let percent = (levelsAchieved / maxLevels) * 100;
            return Math.max(0, Math.min(100, percent));
        };

        const getMasteryColor = (percent) => {
            if (percent < 50) {
                const hue = (percent / 50) * 60;
                return `hsl(${hue}, 100%, 45%)`;
            } else {
                const hue = 60 + ((percent - 50) / 50) * 60;
                return `hsl(${hue}, 100%, 40%)`;
            }
        };

        function updateGroupCheckboxState(lesson) {
            const groupCb = document.getElementById(`group-cb-${lesson}`);
            const childCbs = document.querySelectorAll(`.item-cb-${lesson}`);
            if (!groupCb || childCbs.length === 0) return;
            const allChecked = Array.from(childCbs).every(cb => cb.checked);
            const someChecked = Array.from(childCbs).some(cb => cb.checked);
            groupCb.checked = allChecked;
            groupCb.indeterminate = someChecked && !allChecked;
        }

        // --- SPACED REPETITION LOGIC (SRS) ---
        function recordKanjiResult(kanjiChar, passed) {
            if (!kanjiIntervals[kanjiChar]) {
                kanjiIntervals[kanjiChar] = MIN_DISTANCE;
            }

            if (!passed) {
                // Missed: decrease interval to repeat sooner
                kanjiIntervals[kanjiChar] = Math.max(MIN_DISTANCE, Math.floor(kanjiIntervals[kanjiChar] * 0.3));
            } else {
                // Perfect: increase interval to push it further out
                kanjiIntervals[kanjiChar] = Math.floor(kanjiIntervals[kanjiChar] * 2.0);
            }

            if (storageAvailable) {
                localStorage.setItem('kanjiIntervalsPrefs', JSON.stringify(kanjiIntervals));
            }

            // Splice it back into the queue based on its new interval
            // If interval is larger than queue length, it naturally defaults to the front of the queue (0)
            if (userSelectedKanji.has(kanjiChar)) {
                let insertDist = kanjiIntervals[kanjiChar];
                let spliceIndex = Math.max(0, reviewQueue.length - insertDist);
                reviewQueue.splice(spliceIndex, 0, kanjiChar);
            }
        }

        // --- GAME LOGIC ---
        async function loadNextKanji() {
            if (userSelectedKanji.size === 0) {
                promptMeaning.textContent = "No Kanji Selected";
                expectedStrokes = [];
                currentStrokeIdx = 0;
                activeStroke = [];
                completedStrokes = [];
                // Removed manual render() call
                return;
            }

            // Fallback for initial startup
            if (reviewQueue.length === 0) {
                reviewQueue = shuffleArray(Array.from(userSelectedKanji));
            }

            const nextKanjiChar = reviewQueue.pop();
            const data = KANJI_DATABASE.find(k => k.kanji === nextKanjiChar);
            currentKanjiData = data;

            promptMeaning.textContent = "Loading...";
            activeStroke = [];
            activeMorphs = [];
            completedStrokes = [];
            isSuccessAnimating = false;
            confettiParticles = [];
            currentStrokeIdx = 0;
            failCount = 0;
            teachMode = false;
            usedHintForKanji = false;
            teachBtn.textContent = "Teach Me";

            expectedStrokes = [];

            // Pre-initialize the target scale to the "zoomed in" bounds
            // so Teach Me has a sensible default before any user strokes
            const rect = canvas.getBoundingClientRect();
            const padding = 20;
            const targetSize = Math.min(rect.width, rect.height) - padding * 2;
            frameScale = targetSize / 109;
            frameOffsetX = (rect.width - (109 * frameScale)) / 2;
            frameOffsetY = (rect.height - (109 * frameScale)) / 2;

            try {
                const unicodeStr = data.kanji.charCodeAt(0).toString(16).padStart(5, '0');
                const url = `https://cdn.jsdelivr.net/gh/KanjiVG/kanjivg@master/kanji/${unicodeStr}.svg`;

                const response = await fetch(url);
                if (!response.ok) throw new Error("Failed to fetch SVG");

                const svgText = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(svgText, "image/svg+xml");

                const pathEls = doc.querySelectorAll(`g[id^="kvg:StrokePaths"] path`);
                const paths = Array.from(pathEls).map(el => el.getAttribute('d'));

                const showEnglish = Math.random() > 0.5;
                const combinedReadings = [data.onyomi, data.kunyomi].filter(r => r && r.trim() !== '').join('; ');
                let promptText = showEnglish ? data.meaning : combinedReadings;
                if (!promptText || promptText.trim() === '') {
                    promptText = showEnglish ? combinedReadings : data.meaning;
                }

                // Wrap segments as stylish chips to visually separate them and prevent awkward breaks
                const segments = promptText.split(';').map(s => s.trim());
                promptMeaning.innerHTML = `<div class="flex flex-wrap justify-center gap-2">${segments.map(s => `<span class="bg-indigo-50 border border-indigo-200 text-indigo-700 rounded-2xl px-4 py-1 shadow-sm">${s}</span>`).join('')}</div>`;

                expectedStrokes = paths.map(path => getPointsFromSvgPath(path, NUM_POINTS));
                updateProgress();
            } catch (err) {
                console.error(err);
                promptMeaning.textContent = "Error loading data!";
            }
        }

        function updateProgress() {
            progressText.textContent = `Stroke ${currentStrokeIdx + 1} / ${expectedStrokes.length}`;
        }

        function showMessage(msg) {
            messageArea.textContent = msg;
            messageArea.classList.remove('opacity-0');
            setTimeout(() => messageArea.classList.add('opacity-0'), 2500);
        }

        function triggerError(msg = null) {
            failCount++;
            if (failCount >= 3) {
                usedHintForKanji = true;
            }
            strokeColor = "#EF4444";
            isShaking = true;
            playErrorBeep();
            if (msg) showMessage(msg);

            let startTime = performance.now();
            function shakeAnim(time) {
                const elapsed = time - startTime;
                if (elapsed < 300) {
                    shakeOffset = Math.sin(elapsed * 0.05) * 5 * (1 - elapsed / 300);
                    requestAnimationFrame(shakeAnim);
                } else {
                    shakeOffset = 0;
                    isShaking = false;
                    activeStroke = [];
                    strokeColor = "#374151";
                }
            }
            requestAnimationFrame(shakeAnim);
        }

        function handleStrokeEnd() {
            if (activeStroke.length < 5) {
                activeStroke = [];
                return;
            }

            const userResampled = getPointsFromStroke(activeStroke, NUM_POINTS);
            const expectedStroke = expectedStrokes[currentStrokeIdx];

            const uLen = getStrokeLength(userResampled);
            const eLenOriginal = getStrokeLength(expectedStroke);
            const isDot = eLenOriginal < 12;

            if (currentStrokeIdx === 0 && !teachMode) {
                // STROKE 1: Normalize to endpoints
                let scale, offsetX, offsetY;

                if (isDot) {
                    const ubb = getBoundingBox(userResampled);
                    const ebb = getBoundingBox(expectedStroke);
                    scale = Math.max(ubb.width, ubb.height) / Math.max(ebb.width, ebb.height);
                    if (scale === 0 || !isFinite(scale)) scale = 1;
                    offsetX = ubb.minX + ubb.width / 2 - (ebb.minX + ebb.width / 2) * scale;
                    offsetY = ubb.minY + ubb.height / 2 - (ebb.minY + ebb.height / 2) * scale;
                } else {
                    const uDist = Math.hypot(userResampled[NUM_POINTS - 1].x - userResampled[0].x, userResampled[NUM_POINTS - 1].y - userResampled[0].y);
                    const eDist = Math.hypot(expectedStroke[NUM_POINTS - 1].x - expectedStroke[0].x, expectedStroke[NUM_POINTS - 1].y - expectedStroke[0].y);
                    scale = uDist / eDist;
                    offsetX = userResampled[0].x - expectedStroke[0].x * scale;
                    offsetY = userResampled[0].y - expectedStroke[0].y * scale;
                }

                // First, project and SCORE the stroke EXACTLY as the user drew it
                const tempProjectedRaw = expectedStroke.map(p => ({ x: p.x * scale + offsetX, y: p.y * scale + offsetY }));

                let dirDeg = getAngleDiffDeg(getStrokeAngle(userResampled), getStrokeAngle(tempProjectedRaw));
                if (isDot) dirDeg = 0; // Ignore direction for dots

                let rmsPx = calculateRMSDistance(userResampled, tempProjectedRaw);
                let normalizedRms = rmsPx / scale;

                const passDir = dirDeg <= THRESHOLDS.stroke1.directionDeg;
                const passRms = normalizedRms <= THRESHOLDS.stroke1.rmsBase;

                if (passDir && passRms) {
                    // Only reject if it's ridiculously small
                    if (scale < MIN_SCALE) {
                        triggerError("Stroke drawn too small!");
                        return;
                    }

                    // Stroke is good! Now, clamp the bounding box so it safely fits inside the canvas
                    const rect = canvas.getBoundingClientRect();
                    const padding = 20; // 20px safe zone

                    let finalScale = scale;
                    const maxAllowedScale = Math.min((rect.width - padding * 2) / 109, (rect.height - padding * 2) / 109);

                    if (finalScale > maxAllowedScale) {
                        finalScale = maxAllowedScale; // Clamp scale
                    }

                    let finalOffsetX = offsetX;
                    let finalOffsetY = offsetY;

                    // Clamp X and Y offsets so the 109x109 frame cannot go off-screen
                    const maxX = rect.width - padding - (109 * finalScale);
                    const maxY = rect.height - padding - (109 * finalScale);

                    finalOffsetX = Math.max(padding, Math.min(finalOffsetX, maxX));
                    finalOffsetY = Math.max(padding, Math.min(finalOffsetY, maxY));

                    // Save as the constrained Master Frame
                    frameScale = finalScale;
                    frameOffsetX = finalOffsetX;
                    frameOffsetY = finalOffsetY;

                    // Morph the user's stroke to the CLAMPED final position
                    const tempProjectedFinal = expectedStroke.map(p => ({ x: p.x * finalScale + finalOffsetX, y: p.y * finalScale + finalOffsetY }));
                    triggerSuccess(userResampled, tempProjectedFinal);
                } else {
                    triggerError(); // Failed Dir or P&S
                }

            } else {
                // STROKES 2+: Project via Master Frame
                const projectedExpected = expectedStroke.map(p => ({
                    x: p.x * frameScale + frameOffsetX,
                    y: p.y * frameScale + frameOffsetY
                }));

                let dirDeg = getAngleDiffDeg(getStrokeAngle(userResampled), getStrokeAngle(projectedExpected));
                if (isDot) dirDeg = 0;

                let rmsPx = calculateRMSDistance(userResampled, projectedExpected);
                let normalizedRms = rmsPx / frameScale; // Normalize subsequent strokes too!

                let eLenProj = getStrokeLength(projectedExpected);
                let lenRatio = uLen / eLenProj;
                if (isDot) lenRatio = 1.0;

                const passDir = dirDeg <= THRESHOLDS.subsequent.directionDeg;
                const passRms = normalizedRms <= THRESHOLDS.subsequent.rmsBase;

                // Allow a flat pixel buffer so short strokes aren't overly penalized by strict ratios
                const minAllowedLen = (eLenProj * THRESHOLDS.subsequent.lengthMin) - THRESHOLDS.subsequent.lengthBufferPx;
                const maxAllowedLen = (eLenProj * THRESHOLDS.subsequent.lengthMax) + THRESHOLDS.subsequent.lengthBufferPx;
                const passLen = (uLen >= minAllowedLen && uLen <= maxAllowedLen) || isDot;

                if (passDir && passRms && passLen) {
                    triggerSuccess(userResampled, projectedExpected);
                } else {
                    triggerError();
                }
            }
        }

        function triggerSuccess(userPts, expectedPts) {
            strokeColor = "#10B981";
            failCount = 0;
            playSuccessChime();

            const morph = {
                fromPtsInKanjiSpace: userPts.map(p => ({
                    x: (p.x - frameOffsetX) / frameScale,
                    y: (p.y - frameOffsetY) / frameScale
                })),
                strokeIdx: currentStrokeIdx,
                progress: 0
            };
            activeMorphs.push(morph);
            activeStroke = [];

            let lastTime = performance.now();
            function morphAnim(time) {
                const dt = time - lastTime;
                lastTime = time;
                morph.progress += dt / 300;

                if (morph.progress >= 1) {
                    if (!activeMorphs.includes(morph)) return; // Morph was cancelled/cleared
                    completedStrokes.push(expectedPts);
                    activeMorphs = activeMorphs.filter(m => m !== morph);
                } else {
                    if (!activeMorphs.includes(morph)) return; // Morph was cancelled/cleared
                    requestAnimationFrame(morphAnim);
                }
            }
            requestAnimationFrame(morphAnim);

            advanceStroke();
        }

        function triggerFullSuccessAnimation(isPassed = true) {
            if (isPassed) playPartyPopper();

            const rect = canvas.getBoundingClientRect();
            const padding = 20;
            const targetSize = Math.min(rect.width, rect.height) - padding * 2;

            finalScale = targetSize / 109;
            finalOffsetX = (rect.width - (109 * finalScale)) / 2;
            finalOffsetY = (rect.height - (109 * finalScale)) / 2;

            confettiParticles = [];
            if (isPassed) {
                const colors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];

                expectedStrokes.forEach(stroke => {
                    const projected = stroke.map(p => ({
                        x: p.x * frameScale + frameOffsetX,
                        y: p.y * frameScale + frameOffsetY
                    }));
                    for (let i = 0; i < projected.length; i += 4) {
                        confettiParticles.push({
                            x: projected[i].x,
                            y: projected[i].y,
                            // Increased initial burst velocity for a punchier pop
                            vx: (Math.random() - 0.5) * 16,
                            vy: (Math.random() - 0.5) * 16 - 3,
                            color: colors[Math.floor(Math.random() * colors.length)],
                            size: Math.random() * 6 + 4,
                            life: 1.0,
                            decay: Math.random() * 0.003 + 0.001
                        });
                    }
                });
            }

            successStartTime = performance.now();
            isSuccessAnimating = true;
            teachBtn.textContent = "Show Info";
        }

        function advanceStroke() {
            currentStrokeIdx++;
            if (currentStrokeIdx >= expectedStrokes.length) {
                // Kanji finished! Score it in the SRS queue.
                const passed = !usedHintForKanji;
                recordKanjiResult(currentKanjiData.kanji, passed);

                triggerFullSuccessAnimation(passed);
            } else {
                updateProgress();
            }
        }

        // --- INPUT HANDLING ---
        function getPointerPos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        canvas.addEventListener('pointerdown', (e) => {
            if (isSuccessAnimating) {
                loadNextKanji();
                return;
            }
            if (currentStrokeIdx >= expectedStrokes.length) return;
            isDrawing = true;
            canvas.setPointerCapture(e.pointerId);
            strokeColor = "#374151"; // Reset color
            activeStroke = [getPointerPos(e)]; // This clears out the old red failed stroke!
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            activeStroke.push(getPointerPos(e));
        });

        canvas.addEventListener('pointerup', (e) => {
            if (!isDrawing) return;
            isDrawing = false;
            canvas.releasePointerCapture(e.pointerId);
            handleStrokeEnd();
        });

        teachBtn.addEventListener('click', () => {
            if (isSuccessAnimating) {
                showKanjiInfo(currentKanjiData);
                return;
            }
            if (currentKanjiData) {
                teachMode = true;
                usedHintForKanji = true;
            }
        });

        // --- SEARCH LOGIC ---
        let isSearchActive = false;
        const searchToggleBtn = document.getElementById('search-toggle-btn');
        const searchContainer = document.getElementById('search-container');
        const settingsTitle = document.getElementById('settings-title');
        const searchInput = document.getElementById('search-input');

        searchToggleBtn.addEventListener('click', () => {
            isSearchActive = !isSearchActive;
            if (isSearchActive) {
                settingsTitle.classList.add('hidden');
                searchContainer.classList.remove('hidden');
                searchContainer.classList.add('flex');
                searchInput.focus();
            } else {
                settingsTitle.classList.remove('hidden');
                searchContainer.classList.add('hidden');
                searchContainer.classList.remove('flex');
                searchInput.value = '';
                clearSearch();
            }
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                executeSearch(searchInput.value.trim().toLowerCase());
            }
        });

        document.getElementById('daily-study-btn').addEventListener('click', () => {
            // 1. Unselect all
            userSelectedKanji.clear();

            // 2. Categorize all kanji
            const highMastery = [];
            const midMastery = [];
            const lowMastery = [];

            KANJI_DATABASE.forEach(data => {
                const interval = kanjiIntervals[data.kanji] || 4;
                const percent = getMasteryPercent(interval);
                if (percent >= 70) {
                    highMastery.push(data.kanji);
                } else if (percent >= 5) {
                    midMastery.push(data.kanji);
                } else {
                    lowMastery.push(data.kanji);
                }
            });

            // (1) randomly select 6 kanji with at least 70% mastery
            shuffleArray(highMastery).slice(0, 6).forEach(k => userSelectedKanji.add(k));

            // (2) randomly select 12 kanji with between 5% and 70% mastery
            shuffleArray(midMastery).slice(0, 12).forEach(k => userSelectedKanji.add(k));

            // (3) select the next 2 kanji (not randomly, the first 2 kanji) with below 5% mastery
            lowMastery.slice(0, 2).forEach(k => userSelectedKanji.add(k));

            // Update UI and state
            renderSettings();
            deckNeedsReinit = true;
            if (storageAvailable) {
                localStorage.setItem('kanjiSelectionPrefs', JSON.stringify(Array.from(userSelectedKanji)));
            }

            showMessage("Daily Study mode activated!");
        });

        let infoAnimationId = null;
        async function showKanjiInfo(data) {
            if (infoAnimationId) {
                cancelAnimationFrame(infoAnimationId);
                infoAnimationId = null;
            }
            // Clear the canvas immediately to avoid showing the previous kanji
            infoCtx.clearRect(0, 0, infoCanvas.width, infoCanvas.height);

            infoView.classList.remove('hidden');
            document.getElementById('info-kanji').textContent = data.kanji;
            const meaningDiv = document.getElementById('info-meaning');
            meaningDiv.innerHTML = '';
            const meaningSegments = data.meaning.split(/[,;]/).map(s => s.trim()).filter(s => s !== '');
            meaningSegments.forEach(s => {
                const span = document.createElement('span');
                span.className = 'bg-indigo-600 text-white rounded-2xl px-4 py-1.5 shadow-sm text-lg font-bold';
                span.textContent = s;
                meaningDiv.appendChild(span);
            });

            const readingsDiv = document.getElementById('info-readings');
            readingsDiv.innerHTML = '';
            const combined = [data.onyomi, data.kunyomi].filter(r => r && r.trim() !== '').join('; ');
            const segments = combined.split(';').map(s => s.trim()).filter(s => s !== '');
            segments.forEach(s => {
                const span = document.createElement('span');
                span.className = 'bg-indigo-50 border border-indigo-200 text-indigo-700 rounded-2xl px-4 py-1 shadow-sm text-sm font-medium';
                span.textContent = s;
                readingsDiv.appendChild(span);
            });

            // SVG Fetching
            try {
                const unicodeStr = data.kanji.charCodeAt(0).toString(16).padStart(5, '0');
                const url = `https://cdn.jsdelivr.net/gh/KanjiVG/kanjivg@master/kanji/${unicodeStr}.svg`;
                const response = await fetch(url);
                const svgText = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(svgText, "image/svg+xml");
                const pathEls = doc.querySelectorAll('path');
                const paths = Array.from(pathEls)
                    .map(el => el.getAttribute('d'))
                    .filter(d => d && !d.includes('M 0 0'));

                const strokes = paths.map(path => getPointsFromSvgPath(path, NUM_POINTS));
                startInfoAnimation(strokes);
            } catch (e) {
                console.error(e);
            }
        }

        function startInfoAnimation(strokes) {
            if (infoAnimationId) cancelAnimationFrame(infoAnimationId);

            const rect = infoCanvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            infoCanvas.width = rect.width * dpr;
            infoCanvas.height = rect.height * dpr;
            infoCtx.scale(dpr, dpr);

            // Pre-calculate cumulative distances for each stroke in Kanji space (0-109)
            const strokeInfo = strokes.map(pts => {
                const dists = [0];
                let total = 0;
                for (let i = 1; i < pts.length; i++) {
                    const dx = pts[i].x - pts[i - 1].x;
                    const dy = pts[i].y - pts[i - 1].y;
                    total += Math.sqrt(dx * dx + dy * dy);
                    dists.push(total);
                }
                return { pts, dists, total };
            });

            let currentIdx = 0;
            let state = 'drawing'; // 'drawing' or 'pause'
            let stateStartTime = performance.now();
            const STROKE_PAUSE = 400;
            const LOOP_PAUSE = 1200;
            const DRAW_SPEED = 0.25; // Kanji units per ms

            function animate(time) {
                infoCtx.clearRect(0, 0, rect.width, rect.height);

                const padding = 30;
                const size = Math.min(rect.width, rect.height) - padding * 2;
                const s = size / 109;
                const ox = (rect.width - 109 * s) / 2;
                const oy = (rect.height - 109 * s) / 2;

                // Draw already completed strokes
                for (let i = 0; i < currentIdx; i++) {
                    const pts = strokeInfo[i].pts.map(p => ({ x: p.x * s + ox, y: p.y * s + oy }));
                    drawOnCtx(infoCtx, pts, "#374151", 10);
                }

                if (currentIdx < strokeInfo.length) {
                    const info = strokeInfo[currentIdx];
                    if (state === 'drawing') {
                        const elapsed = time - stateStartTime;
                        const targetDist = elapsed * DRAW_SPEED;

                        // Calculate partial points
                        const partialPts = [];
                        let reachedEnd = false;
                        if (targetDist >= info.total) {
                            reachedEnd = true;
                            info.pts.forEach(p => partialPts.push({ x: p.x * s + ox, y: p.y * s + oy }));
                        } else {
                            partialPts.push({ x: info.pts[0].x * s + ox, y: info.pts[0].y * s + oy });
                            for (let i = 1; i < info.pts.length; i++) {
                                if (info.dists[i] <= targetDist) {
                                    partialPts.push({ x: info.pts[i].x * s + ox, y: info.pts[i].y * s + oy });
                                } else {
                                    const segDist = info.dists[i] - info.dists[i - 1];
                                    const remaining = targetDist - info.dists[i - 1];
                                    const t = segDist > 0 ? remaining / segDist : 0;
                                    partialPts.push({
                                        x: (info.pts[i - 1].x + (info.pts[i].x - info.pts[i - 1].x) * t) * s + ox,
                                        y: (info.pts[i - 1].y + (info.pts[i].y - info.pts[i - 1].y) * t) * s + oy
                                    });
                                    break;
                                }
                            }
                        }
                        drawOnCtx(infoCtx, partialPts, "#6366F1", 12);

                        if (reachedEnd) {
                            state = 'pause';
                            stateStartTime = time;
                        }
                    } else {
                        // Just draw the full current stroke during pause
                        const pts = info.pts.map(p => ({ x: p.x * s + ox, y: p.y * s + oy }));
                        drawOnCtx(infoCtx, pts, "#6366F1", 12);

                        if (time - stateStartTime > STROKE_PAUSE) {
                            currentIdx++;
                            state = 'drawing';
                            stateStartTime = time;
                        }
                    }
                } else {
                    // All strokes done, waiting for loop
                    if (time - stateStartTime > LOOP_PAUSE) {
                        currentIdx = 0;
                        state = 'drawing';
                        stateStartTime = time;
                    }
                }

                infoAnimationId = requestAnimationFrame(animate);
            }
            infoAnimationId = requestAnimationFrame(animate);
        }

        document.getElementById('close-info-btn').addEventListener('click', () => {
            infoView.classList.add('hidden');
            if (infoAnimationId) cancelAnimationFrame(infoAnimationId);
        });

        function clearSearch() {
            Object.values(kanjiDomElements).forEach(dom => {
                dom.itemDiv.classList.remove('bg-yellow-200');
            });
        }

        function executeSearch(query) {
            clearSearch();
            if (!query) return;

            let firstMatch = null;
            KANJI_DATABASE.forEach(data => {
                const dom = kanjiDomElements[data.kanji];
                if (!dom) return;

                const matches = data.kanji.includes(query) ||
                    data.meaning.toLowerCase().includes(query) ||
                    data.onyomi.includes(query) ||
                    data.kunyomi.includes(query);

                if (matches) {
                    dom.itemDiv.classList.add('bg-yellow-200');
                    dom.expandLesson();
                    if (!firstMatch) firstMatch = dom.itemDiv;
                }
            });

            if (firstMatch) {
                firstMatch.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        document.getElementById('settings-btn').addEventListener('click', () => {
            renderSettings();
            mainView.classList.add('hidden');
            settingsView.classList.remove('hidden');

            if (isSearchActive) {
                isSearchActive = false;
                settingsTitle.classList.remove('hidden');
                searchContainer.classList.add('hidden');
                searchContainer.classList.remove('flex');
                searchInput.value = '';
            }
        });

        document.getElementById('close-settings-btn').addEventListener('click', () => {
            settingsView.classList.add('hidden');
            mainView.classList.remove('hidden');

            // Reinitialize the review deck if checkboxes changed
            if (deckNeedsReinit) {
                const activeKanji = currentKanjiData ? currentKanjiData.kanji : null;
                // Shuffle everything except the one currently on the screen
                reviewQueue = shuffleArray(Array.from(userSelectedKanji).filter(k => k !== activeKanji));
                deckNeedsReinit = false;
            }

            if (expectedStrokes.length === 0 || userSelectedKanji.size === 0 || (currentKanjiData && !userSelectedKanji.has(currentKanjiData.kanji))) {
                loadNextKanji();
            }
        });

        document.getElementById('mute-btn').addEventListener('click', () => {
            isMuted = !isMuted;
            updateMuteUI();
            if (storageAvailable) {
                localStorage.setItem('isMuted', isMuted);
            }
        });

        // --- RENDER LOOP ---
        function drawOnCtx(c, points, color, width = 8, dash = []) {
            if (points.length < 2) return;
            c.beginPath();
            c.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                const p0 = points[i - 1];
                const p1 = points[i];
                c.quadraticCurveTo(p0.x, p0.y, (p0.x + p1.x) / 2, (p0.y + p1.y) / 2);
            }
            c.lineTo(points[points.length - 1].x, points[points.length - 1].y);
            c.strokeStyle = color;
            c.lineWidth = width;
            c.lineCap = 'round';
            c.lineJoin = 'round';
            c.setLineDash(dash);
            c.stroke();
            c.setLineDash([]);
        }

        function drawLine(points, color, width = 8, dash = []) {
            drawOnCtx(ctx, points, color, width, dash);
        }

        function render() {
            const rect = canvas.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);

            ctx.save();
            if (isShaking) ctx.translate(shakeOffset, 0);

            let s = frameScale;
            let ox = frameOffsetX;
            let oy = frameOffsetY;
            let drawColor = "#000000";

            if (isSuccessAnimating) {
                drawColor = "#10B981";
                const elapsed = performance.now() - successStartTime;
                const t = Math.min(elapsed / 1000, 1);
                const easeT = 1 - Math.pow(1 - t, 3);

                s = frameScale + (finalScale - frameScale) * easeT;
                ox = frameOffsetX + (finalOffsetX - frameOffsetX) * easeT;
                oy = frameOffsetY + (finalOffsetY - frameOffsetY) * easeT;
            }

            // Draw Completed Strokes
            if (isSuccessAnimating) {
                // Draw all finished strokes from the ground truth, but skip ones currently morphing
                expectedStrokes.forEach((exp, idx) => {
                    if (activeMorphs.some(m => m.strokeIdx === idx)) return;
                    // Only draw if it's already "reached" or was already completed
                    if (idx < currentStrokeIdx) {
                        const pts = exp.map(p => ({ x: p.x * s + ox, y: p.y * s + oy }));
                        drawLine(pts, drawColor, 12);
                    }
                });
            } else {
                completedStrokes.forEach(pts => drawLine(pts, drawColor, 12));
            }

            // Draw Hint - Triggers if failCount >= 3 or teachMode
            if ((failCount >= 3 || teachMode) && !isDrawing && activeMorphs.length === 0 && expectedStrokes[currentStrokeIdx]) {
                const exp = expectedStrokes[currentStrokeIdx];
                const hintPts = exp.map(p => ({ x: p.x * s + ox, y: p.y * s + oy }));
                drawLine(hintPts, "rgba(59, 130, 246, 0.4)", 12, [10, 10]);
            }

            // Draw active/failed stroke (Stays on screen until next touch)
            if (activeStroke.length > 0) {
                drawLine(activeStroke, strokeColor, 12);
            }

            // Draw Morphs
            activeMorphs.forEach(m => {
                const target = expectedStrokes[m.strokeIdx];
                const screenFrom = m.fromPtsInKanjiSpace.map(p => ({ x: p.x * s + ox, y: p.y * s + oy }));
                const screenTo = target.map(p => ({ x: p.x * s + ox, y: p.y * s + oy }));

                const interpPts = [];
                const t = 1 - Math.pow(1 - m.progress, 3);
                for (let i = 0; i < NUM_POINTS; i++) {
                    interpPts.push({
                        x: screenFrom[i].x + (screenTo[i].x - screenFrom[i].x) * t,
                        y: screenFrom[i].y + (screenTo[i].y - screenFrom[i].y) * t
                    });
                }
                drawLine(interpPts, "#10B981", 12);
            });

            // Draw Confetti
            if (isSuccessAnimating) {
                confettiParticles.forEach(p => {
                    // Slightly increased drag to catch the faster initial burst
                    p.vx *= 0.98;
                    p.vy *= 0.98;
                    p.x += p.vx;
                    p.y += p.vy;
                    // Increased gravity for a more natural, satisfying fall
                    p.vy += 0.08;
                    p.life -= p.decay;
                    if (p.life > 0) {
                        ctx.globalAlpha = Math.max(p.life, 0);
                        ctx.fillStyle = p.color;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });
                ctx.globalAlpha = 1.0;
            }

            ctx.restore();
            requestAnimationFrame(render);
        }

        // --- STARTUP ---
        resizeCanvas();
        updateMuteUI();
        loadNextKanji();
        requestAnimationFrame(render);

    </script>
</body>
